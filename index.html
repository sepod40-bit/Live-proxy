<!DOCTYPE html>
<html>
<head>
    <title>بث مباشر</title>
    <meta charset="UTF-8">
    <style>
        body { background: #111; color: #fff; font-family: Arial; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 800px; height: auto; border-radius: 10px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <h2>⚽ البث المباشر</h2>
    <video id="video" controls playsinline></video>
    
    <script>
        const video = document.getElementById('video');
        const streamUrl = 'http://xmrcars.org:8080/bn1hd/mono.m3u8';
        
        // استخدام CORS Proxy لتجاوز الحظر
        const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
        const proxiedStream = proxyUrl + streamUrl;
        
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(proxiedStream);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(e => console.log('اضغط على زر التشغيل'));
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = proxiedStream;
        }
    </script>
</body>
</html>
