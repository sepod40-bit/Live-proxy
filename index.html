<!DOCTYPE html>
<html>
<head>
    <title>بث مباشر</title>
    <meta charset="UTF-8">
    <style>
        body { background: #111; color: #fff; font-family: Arial; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 800px; height: auto; border-radius: 10px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <h2>⚽ البث المباشر</h2>
    <video id="video" controls playsinline></video>
    
    <script>
        const video = document.getElementById('video');
        const streamUrl = 'http://xmrcars.org:8080/bn1hd/mono.m3u8';
        
        if (Hls.isSupported()) {
            const hls = new Hls({
                xhrSetup: function(xhr) {
                    xhr.setRequestHeader('Referer', 'http://xmrcars.org/');
                    xhr.setRequestHeader('Origin', 'http://xmrcars.org');
                }
            });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
        }
    </script>
</body>
</html>
